<!doctype html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0" />
    <title>CoupleMood - Kết quả thanh toán</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loader {
            border-top-color: #3b82f6;
            animation: spinner 1.5s linear infinite;
        }

        @keyframes spinner {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>
<body class="bg-gray-50 h-screen flex items-center justify-center font-sans px-4">
    <div class="bg-white p-8 rounded-3xl shadow-xl max-w-sm w-full text-center border border-gray-100"
         id="content-box"
         style="display: none">
        <div id="icon-container"
             class="mx-auto flex items-center justify-center h-20 w-20 rounded-full mb-6"></div>

        <h2 id="title"
            class="text-2xl font-extrabold text-gray-800 mb-2"></h2>
        <p id="message"
           class="text-gray-500 mb-8 text-sm"></p>

        <div class="flex flex-col items-center justify-center">
            <div class="loader ease-linear rounded-full border-4 border-gray-200 h-8 w-8 mb-3"></div>
            <p class="text-xs text-gray-400">Đang tự động quay lại ứng dụng...</p>
        </div>
    </div>

    <script>
      const urlParams = new URLSearchParams(window.location.search);
      const responseCode = urlParams.get("vnp_ResponseCode");
      const isSuccess = responseCode === "00";

      const contentBox = document.getElementById("content-box");
      const iconContainer = document.getElementById("icon-container");
      const titleEl = document.getElementById("title");
      const messageEl = document.getElementById("message");

      const successIcon = `<svg class='h-10 w-10 text-green-600' fill='none' stroke='currentColor' viewBox='0 0 24 24'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M5 13l4 4L19 7'></path></svg>`;
      const failIcon = `<svg class='h-10 w-10 text-red-600' fill='none' stroke='currentColor' viewBox='0 0 24 24'><path stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M6 18L18 6M6 6l12 12'></path></svg>`;

      if (isSuccess) {
        iconContainer.classList.add("bg-green-100");
        iconContainer.innerHTML = successIcon;
        titleEl.textContent = "Thanh toán thành công!";
        messageEl.textContent = "Tuyệt vời! Giao dịch của bạn đã hoàn tất.";
      } else {
        iconContainer.classList.add("bg-red-100");
        iconContainer.innerHTML = failIcon;
        titleEl.textContent = "Giao dịch thất bại!";
        messageEl.textContent = "Có lỗi xảy ra hoặc bạn đã hủy giao dịch.";
      }

      contentBox.style.display = "block";
    </script>
</body>
</html>
